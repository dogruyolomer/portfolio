<script>
window.addEventListener('DOMContentLoaded', function () {
    // 1. Nerede olduğumuzu anla
    var path = window.location.pathname;
    var isEn = path.indexOf('/en') > -1;
    // Ana sayfa kontrolü (boş, / veya /en/)
    var isHome = path === '/' || path === '/en' || path === '/en/' || path === '';

    // 2. Header içindeki tüm linkleri bul
    var links = document.querySelectorAll('header a');
    
    for (var i = 0; i < links.length; i++) {
        var link = links[i];
        var href = link.getAttribute('href');
        
        // 3. Link anasayfaya gidiyorsa (yani bu bizim sol üstteki logomuzsa)
        if (href === '/' || href === '/en/' || href === 'https://omerhub.com/' || href === 'https://omerhub.com/en/') {
            
            if (isHome) {
                // Anasayfadaysak bu yazıyı TAMAMEN YOK ET
                link.style.display = 'none';
            } else {
                // Hakkımda, Projeler gibi alt sayfalardaysak metni "Ana Sayfa" yap
                link.innerHTML = isEn ? 'Home' : 'Ana Sayfa';
                link.style.fontSize = '1.25rem';
                link.style.fontWeight = 'bold';
            }
            break; // Logoyu bulup işimizi bitirdik, döngüden çık
        }
    }
});
</script>
