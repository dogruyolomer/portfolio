<script>
document.addEventListener('DOMContentLoaded', function () {
    // URL'den hangi dilde ve nerede olduğumuzu anla
    var path = window.location.pathname;
    var isEn = path.startsWith('/en');
    var isHome = path === '/' || path === '/en' || path === '/en/';
    
    // Header'daki ana linki bul
    var logo = document.querySelector('header a[href="/"], header a[href="/en/"]');
    
    if (logo) {
        if (isHome) {
            // Ana sayfadaysak logoyu/metni TAMAMEN YOK ET
            logo.style.display = 'none';
        } else {
            // Alt sayfalardaysak metni "Ana Sayfa" yap
            logo.innerHTML = isEn ? 'Home' : 'Ana Sayfa';
            logo.style.fontSize = '1.25rem';
            logo.style.fontWeight = 'bold';
        }
    }
});
</script>
