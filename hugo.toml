baseURL = 'https://omerhub.com/'
defaultContentLanguage = 'tr'
theme = 'blowfish'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages]
  [languages.tr]
    languageCode = 'tr'
    languageName = "🇹🇷 TR"
    title = 'Ömer Lütfi'
    weight = 1
    [languages.tr.author]
      name = "Ömer Lütfi"
      image = "logo.svg"
      headline = "Mekatronik & Yazılım Serüvenim"
    [[languages.tr.menu.main]]
      name = "Hakkımda"
      pageRef = "/about"
      weight = 10
    [[languages.tr.menu.main]]
      name = "Projeler"
      pageRef = "/projects"
      weight = 20
    [[languages.tr.menu.main]]
      name = "Yazılar"
      pageRef = "/posts"
      weight = 30
    [[languages.tr.menu.main]]
      name = "İletişim"
      pageRef = "/contact"
      weight = 40

  [languages.en]
    languageCode = 'en'
    languageName = "🇬🇧 EN"
    title = 'Omer Lutfi'
    weight = 2
    [languages.en.author]
      name = "Omer Lutfi"
      image = "logo.svg"
      headline = "Mechatronics & Software Journey"
    [[languages.en.menu.main]]
      name = "About me"
      pageRef = "/about"
      weight = 10
    [[languages.en.menu.main]]
      name = "Projects"
      pageRef = "/projects"
      weight = 20
    [[languages.en.menu.main]]
      name = "Articles"
      pageRef = "/posts"
      weight = 30
    [[languages.en.menu.main]]
      name = "Contact me"
      pageRef = "/contact"
      weight = 40

[params]
  defaultAppearance = "dark"
  showSearch = true
  customCSS = ["css/custom.css"]
  mainSections = ["posts", "projects"]
  [params.homepage]
    layout = "profile"
    showRecent = true
  [params.article]
    showReadingTime = false
    showWordCount = false
    showDate = true
  [params.list]
    showCards = false
    groupByYear = false
